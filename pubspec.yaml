name: json_converter
version: 1.0.8+9
publish_to: none
description: Fasih Converter - Generic FASIH backup to Excel/Sheets

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_bloc: ^9.1.1
  auto_route: ^11.1.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  gsheets: ^0.5.0
  file_picker: ^11.0.2
  flutter_archive: ^6.0.4
  path_provider: ^2.1.5
  data_table_2: ^2.7.2
  flutter_spinkit: ^5.2.2
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  line_icons: ^2.0.3
  syncfusion_flutter_xlsio: ^33.2.7
  share_plus: ^12.0.2
  percent_indicator: ^4.2.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  path: ^1.9.1
  dotted_border: ^3.1.0
  filesize: ^2.0.1
  archive: ^4.0.9
  envied: ^1.3.5
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.15.0
  auto_route_generator: ^10.5.0
  injectable_generator: ^3.0.2
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  envied_generator: ^1.3.5

flutter:
  assets:
    - assets/launchers/
  uses-material-design: true

flutter_app_name:
  name: Fasih Converter

flutter_launcher_icons:
  image_path: assets/launchers/icon.png
  image_path_android: assets/launchers/icon.png
  ios: true
  android: true
