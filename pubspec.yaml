name: json_converter
version: 1.0.8+9
publish_to: none
description: Fasih Converter - Generic FASIH backup to Excel/Sheets

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  auto_route: ^11.1.0
  get_it: ^8.0.3
  injectable: ^2.5.0
  gsheets: ^0.5.0
  file_picker: ^8.0.0
  flutter_archive: ^6.0.1
  path_provider: ^2.1.3
  data_table_2: ^2.5.12
  flutter_spinkit: ^5.2.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  line_icons: ^2.0.3
  syncfusion_flutter_xlsio: ^25.1.41
  share_plus: ^10.0.0
  percent_indicator: ^4.2.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  path: ^1.9.0
  dotted_border: ^2.1.0
  filesize: ^2.0.1
  archive: ">=3.6.1 <4.0.0"
  envied: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.9.3
  build_runner: ^2.4.13
  auto_route_generator: ^10.5.0
  injectable_generator: ^2.7.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  envied_generator: ^1.3.5

flutter:
  assets:
    - assets/launchers/
  uses-material-design: true

flutter_app_name:
  name: Fasih Converter

flutter_icons:
  image_path: assets/launchers/icon.png
  image_path_android: assets/launchers/icon.png
  ios: true
  android: true
